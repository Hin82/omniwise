# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
#
# CodeRabbit — automatisk AI-kodgranskning av pull requests.
# Kräver att CodeRabbit-appen är installerad på GitHub-repot (github.com/apps/coderabbitai).

language: sv-SE
early_access: false

reviews:
  profile: chill
  request_changes_workflow: false
  high_level_summary: true
  review_status: true
  poem: false
  collapse_walkthrough: false

  auto_review:
    enabled: true
    drafts: false
    base_branches:
      - main
      - staging
      - "feature/.*"

  path_filters:
    - "!**/node_modules/**"
    - "!css/tailwind.css"
    - "!package-lock.json"
    - "!**/*.min.css"
    - "!**/*.min.js"

  path_instructions:
    - path: "**/*.html"
      instructions: >-
        Statisk webbplats. Kontrollera semantisk HTML, tillgänglighet (ARIA,
        alt-texter), giltig JSON-LD strukturerad data, samt att de svenska
        sidorna och de engelska sidorna (en/) hålls synkroniserade.
    - path: "blogg/**/*.html"
      instructions: >-
        Blogginlägg. Granska mot BLOG_VOICE.md i rotkatalogen:
        självironisk humor, "ni" avslappnat, ingen buzzword-bingo, TL;DR högst
        upp, FAQ-sektion + matchande FAQPage-schema, Article-schema med Conny
        Mohlin som author (@id: https://omniwise.se/#conny-mohlin) och
        OmniWise AB som publisher. Flagga om tonen låter generisk AI-PR.

chat:
  auto_reply: true
